<!DOCTYPE html>
<html>
<head>
  <title>{{ role|capitalize }} Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container center">
    <h2>{{ role|capitalize }} Register</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<p class="flash">{{ messages[0] }}</p>{% endif %}
    {% endwith %}
    <form method="POST">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      {% if role == "student" %}
        <input type="text" name="interest" placeholder="Interest (e.g. Web Dev, AI)" required>
      {% else %}
        <input type="text" name="skill" placeholder="Skill (e.g. Web Dev, AI)" required>
      {% endif %}
      <button class="btn" type="submit">Register</button>
    </form>
    <a href="{{ url_for('home') }}">← Back to Home</a>
  </div>
</body>
</html>
